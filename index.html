<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrónica Analógica - Portafolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800" x-data="courseApp()">

    <section class="bg-gradient-to-br from-slate-900 to-slate-800 text-white py-12 sm:py-20 shadow-inner">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <div class="inline-block bg-blue-500/20 text-blue-300 p-3 rounded-2xl mb-4 backdrop-blur-sm">
                <i class="fa-solid fa-microchip text-2xl sm:text-3xl"></i>
            </div>
            <h1 class="text-3xl sm:text-5xl font-extrabold tracking-tight mb-1">Electrónica Analógica</h1>
            <p class="text-blue-400 font-bold tracking-widest text-xs sm:text-sm uppercase mb-4">
                Alumno: Brismar Alexander Gonzalez Quezada 
            </p>
            <p class="text-blue-400 font-bold tracking-widest text-xs sm:text-sm uppercase mb-4">Portafolio de evidencias 2026</p>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-4 -mt-6 sm:-mt-8 relative z-10 pb-20">
        <div class="bg-white p-2 rounded-2xl shadow-lg border border-slate-100 mb-6 flex overflow-x-auto gap-2 sm:justify-center no-scrollbar">
            <template x-for="unit in units" :key="unit.id">
                <button @click="activeUnit = unit.id" :class="activeUnit === unit.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'" class="px-5 py-2.5 rounded-xl font-bold text-sm whitespace-nowrap transition-all">
                    <span x-text="unit.title"></span>
                </button>
            </template>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-5 sm:p-8 border border-slate-100 min-h-[400px]">
            <template x-for="unit in units" :key="unit.id">
                <div x-show="activeUnit === unit.id" x-cloak class="fade-in">
                    <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                        <h2 class="text-xl sm:text-2xl font-bold text-slate-800" x-text="unit.title"></h2>
                    </div>

                    <div class="space-y-4">
                        <template x-for="(task, index) in unit.assignments" :key="index">
                            <div class="group bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col sm:flex-row items-center justify-between gap-4" :class="task.link ? 'border-l-4 border-l-blue-500' : 'border-l-4 border-l-slate-300 opacity-60'">
                                <div class="flex items-start space-x-4 w-full">
                                    <div class="p-3 rounded-lg bg-white text-blue-500 shadow-sm"><i class="fa-solid fa-file-pdf"></i></div>
                                    <div>
                                        <h3 class="font-bold text-slate-800 text-sm sm:text-base" x-text="task.title"></h3>
                                        <p class="text-xs text-slate-500 mt-1" x-text="task.link ? 'Disponible' : 'Pendiente'"></p>
                                    </div>
                                </div>
                                <div x-show="task.link" class="flex w-full sm:w-auto space-x-2">
                                    <a :href="task.link.replace('dl=0', 'dl=1')" target="_blank" class="flex-1 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg text-sm font-bold text-center">Descargar</a>
                                    <a :href="task.link" target="_blank" class="flex-1 px-6 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold text-center">Abrir</a>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function courseApp() {
            return {
                activeUnit: 1,
                units: [
                    { id: 1, title: 'Unidad 1', assignments: [
                        { title: 'Práctica #1: Medición de resistencia', link: 'https://www.dropbox.com/scl/fi/jg5uh42964ptga07p1mvf/Practica-1.pdf?rlkey=ttqxrze9gvhv04vbxrt8k0m46&dl=0' },
                        { title: 'Práctica #2: Rectificadores', link: 'https://www.dropbox.com/scl/fi/va0w2whvnuot485xa36me/Practica-2.pdf?rlkey=mcg5nrdjse0iwslpjfuq177c7&dl=0' },
                        { title: 'Examen: Fuente de voltaje', link: 'https://www.dropbox.com/scl/fi/3lphcu6of66m7ebp4k5f5/Reporte-examen-Unidad-1.pdf?rlkey=cxwd7tacxyoclksntwwukcs80&dl=0' }
                    ]},
                    { id: 2, title: 'Unidad 2', assignments: [
                        { title: 'Investigación: Curvas características', link: 'https://www.dropbox.com/scl/fi/grvlaicirg23nuhttvset/Investigacion-Transistores.pdf?rlkey=sebue8tgawrmu7uomrkckwbmt&dl=0' },
                        { title: 'Práctica #3: Amplificador/Interruptor', link: 'https://www.dropbox.com/scl/fi/4txdxygk8uf923ynnc1px/Practica-3.pdf?rlkey=od6a1r709r9iucswab97akmte&dl=0' }
                    ]},
                    { id: 3, title: 'Unidad 3', assignments: [
                        { title: 'Práctica: Sensor crepuscular', link: '' },
                        { title: 'Trabajo pendiente 1', link: '' },
                        { title: 'Trabajo pendiente 2', link: '' },
                        { title: 'Trabajo pendiente 3', link: '' }
                    ]},
                    { id: 4, title: 'Unidad 4', assignments: [
                        { title: 'Pendiente 1', link: '' },
                        { title: 'Pendiente 2', link: '' },
                        { title: 'Pendiente 3', link: '' }
                    ]},
                    { id: 5, title: 'Unidad 5', assignments: [
                        { title: 'Pendiente 1', link: '' },
                        { title: 'Pendiente 2', link: '' },
                        { title: 'Pendiente 3', link: '' }
                    ]}
                ]
            }
        }
    </script>
</body>
</html>
